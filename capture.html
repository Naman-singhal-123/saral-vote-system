<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saral Vote - Face Capture</title>
<style>
body {margin:0;font-family:'Poppins',sans-serif;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);}
.container {background: rgba(255,255,255,0.05); border-radius:25px;padding:40px;width:520px;text-align:center;box-shadow:0 15px 40px rgba(0,0,0,0.6);backdrop-filter:blur(15px);border:2px solid rgba(255,255,255,0.1);}
h1 {color:#00f2fe;font-size:28px;letter-spacing:1px;margin-bottom:25px;}
.video-container {position:relative;}
#video-feed {width:100%;border-radius:20px;border:4px solid #00f2fe;transition: transform 0.3s, box-shadow 0.3s;}
#video-feed:hover {transform:scale(1.03);box-shadow:0 0 30px #00f2fe;}
.form-container {margin-top:20px;display:flex;gap:10px;}
input {padding:12px;border-radius:10px;border:1px solid #ccc;font-size:16px;flex:1;background:rgba(255,255,255,0.1);color:#fff;}
input::placeholder {color:#ccc;}
input:focus {outline:none;border-color:#00f2fe;box-shadow:0 0 15px #00f2fe;}
button {padding:12px 20px;border-radius:10px;border:none;background:linear-gradient(45deg,#00f2fe,#4facfe);color:#fff;font-size:16px;cursor:pointer;transition:all 0.3s;}
button:hover {transform:scale(1.05);box-shadow:0 5px 20px rgba(0,255,255,0.5);}
#status {margin-top:20px;font-size:18px;display:flex;justify-content:center;align-items:center;gap:12px;}
.tick {color:#0ff500;font-size:28px;animation:pop 0.5s ease;}
.cross {color:#ff3b30;font-size:28px;animation:pop 0.5s ease;}
@keyframes pop {0%{transform:scale(0);opacity:0;}50%{transform:scale(1.4);opacity:1;}100%{transform:scale(1);opacity:1;}}
</style>
</head>
<body>
<div class="container">
    <h1>Saral Vote - Face Capture</h1>
    <div class="video-container">
        <img id="video-feed" src="{{ url_for('video') }}">
    </div>
    <div class="form-container">
        <input type="text" id="user_id" placeholder="Enter User ID">
        <button id="capture-btn">Capture Face</button>
    </div>
    <div id="status"></div>
</div>

<script>
function speak(text){
    const synth = window.speechSynthesis;
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1;
    synth.speak(utter);
}

window.onload = () => {
    speak("Please show your face in the camera and enter your User ID.");
};

const captureBtn = document.getElementById("capture-btn");
const status = document.getElementById("status");

captureBtn.addEventListener("click", () => {
    const userId = document.getElementById("user_id").value.trim();
    if(!userId){
        alert("Please enter User ID");
        speak("Please enter User ID first.");
        return;
    }

    status.innerHTML = "Capturing...";
    speak("Capturing face now.");

    const formData = new FormData();
    formData.append("user_id", userId);

    fetch("/capture", {method:"POST", body:formData})
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            status.innerHTML = `<span class="tick">&#10004;</span> ${data.message}`;
            speak("Face captured successfully!");
        } else {
            status.innerHTML = `<span class="cross">&#10008;</span> ${data.message}`;
            speak("Error capturing face, please try again.");
        }
    })
    .catch(err => {
        status.innerHTML = `<span class="cross">&#10008;</span> Error capturing face`;
        speak("Error capturing face, please try again.");
    });
});
</script>
</body>
</html>
